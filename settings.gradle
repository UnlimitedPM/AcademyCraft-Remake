pluginManagement {
    repositories {
        gradlePluginPortal()
        maven {
            name = 'forge'
            url = 'https://maven.minecraftforge.net/'
        }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.7.0'
}

// Le nom du projet vient APRES les plugins
rootProject.name = 'academy'